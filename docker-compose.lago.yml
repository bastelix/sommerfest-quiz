# Lago Billing Stack — included by the main docker-compose via:
#   docker compose -f docker-compose.yml -f docker-compose.lago.yml up -d
#
# All Lago services run on the shared edocs network so the main app
# can reach lago-api for REST calls and Lago can send webhooks back.

services:
  lago-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: lago
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: ${LAGO_DB_PASSWORD:?Set LAGO_DB_PASSWORD in .env}
    volumes:
      - lago_postgres:/var/lib/postgresql/data
    networks:
      - webproxy

  lago-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${LAGO_REDIS_PASSWORD:-changeme}
    volumes:
      - lago_redis:/data
    networks:
      - webproxy

  lago-api:
    image: getlago/api:v1.22.1
    restart: unless-stopped
    depends_on:
      - lago-db
      - lago-redis
    command: ['./scripts/start.sh']
    environment:
      LAGO_API_URL: ${LAGO_API_URL:-https://billing.edocs.cloud}
      DATABASE_URL: postgresql://lago:${LAGO_DB_PASSWORD}@lago-db:5432/lago
      REDIS_URL: redis://:${LAGO_REDIS_PASSWORD:-changeme}@lago-redis:6379
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY_BASE:?Set LAGO_SECRET_KEY_BASE in .env}
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY:?Set LAGO_RSA_PRIVATE_KEY in .env}
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
      LAGO_FRONT_URL: ${LAGO_FRONT_URL:-https://billing.edocs.cloud}
      LAGO_FROM_EMAIL: ${LAGO_FROM_EMAIL:-billing@edocs.cloud}
      LAGO_WEBHOOK_ATTEMPTS: '3'
      # Stripe integration (Lago uses Stripe as payment processor)
      LAGO_STRIPE_PRIVATE_KEY: ${STRIPE_SECRET_KEY:-}
      # SMTP for Lago emails
      SMTP_ADDRESS: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASS:-}
    networks:
      - webproxy

  lago-worker:
    image: getlago/api:v1.22.1
    restart: unless-stopped
    depends_on:
      - lago-db
      - lago-redis
    command: ['./scripts/start.worker.sh']
    environment:
      DATABASE_URL: postgresql://lago:${LAGO_DB_PASSWORD}@lago-db:5432/lago
      REDIS_URL: redis://:${LAGO_REDIS_PASSWORD:-changeme}@lago-redis:6379
      SECRET_KEY_BASE: ${LAGO_SECRET_KEY_BASE}
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: 'true'
    networks:
      - webproxy

  lago-front:
    image: getlago/front:v1.22.1
    restart: unless-stopped
    environment:
      API_URL: ${LAGO_API_URL:-https://billing.edocs.cloud}
      APP_ENV: production
    networks:
      - webproxy

volumes:
  lago_postgres:
  lago_redis:
