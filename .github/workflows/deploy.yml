name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote deploy commands
        uses: appleboy/ssh-action@d91a1af6f57cd4478ceee14d7705601dafabaa19
        with:
          host: ${{ secrets.DOMAIN }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          script: |
            set -e
            cd /var/edocs-cloud
            git remote prune origin
            git fetch origin main
            git reset --hard origin/main
            mkdir -p resources/fonts
            curl -L -o resources/fonts/NotoSans-Bold.ttf https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSans/NotoSans-Bold.ttf
            export $(grep -E '^[A-Za-z_][A-Za-z_0-9]*=' .env | sed 's/[[:space:]]#.*//' | xargs) 2>/dev/null || true
            if [[ "${POSTGRES_DSN:-}" != pgsql:* ]]; then
              echo "POSTGRES_DSN must start with pgsql: to run migrations in production."
              exit 1
            fi
            BASE_IMAGE="${APP_IMAGE%:*}"
            docker build -t "$APP_IMAGE" -t "${BASE_IMAGE}:latest" .
            export COMPOSE_PROJECT_NAME=edocs-cloud
            docker compose -p edocs-cloud rm -f 2>/dev/null || true
            docker compose -p edocs-cloud up -d --build --remove-orphans --wait
            docker compose -p edocs-cloud exec -T slim php scripts/run_migrations.php
            docker compose -p edocs-cloud ps slim
