site_name: edocs.cloud Dokumentation
site_url: https://bastelix.github.io/edocs-cloud/
site_description: Agentur-CMS mit Quiz, Wiki, Ticketsystem und MCP-Integration – Dokumentation
repo_url: https://github.com/bastelix/edocs-cloud
repo_name: bastelix/edocs-cloud

docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Startseite: index.md
  - Handbuch:
    - Überblick: about.md
    - Spielablauf: spielablauf.md
    - FAQ: faq.md
  - Architektur:
    - Überblick: architecture.md
    - Namespace-Design: namespace-design.md
    - Architektur-Review: architecture-review.md
    - ADR:
      - "001 – Namespace Text Slugs": adr/001-namespace-text-slugs.md
      - "002 – No DI Container": adr/002-no-di-container-legacy.md
      - "003 – No Frontend Build Tool": adr/003-no-frontend-build-tool.md
  - Module:
    - Wiki: wiki.md
    - Ticketsystem: tickets.md
    - Quiz & Events: quiz-events.md
    - News: news.md
    - Menü-System: menu-system.md
    - Footer-Builder: footer-builder.md
  - API & MCP:
    - API-Referenz: api-v1-reference.md
    - MCP-Tool-Referenz: mcp-reference.md
    - MCP-Connector-Setup: mcp-connector-setup.md
  - Design & Frontend:
    - Design-System: design-system.md
    - Marketing-Tokens: marketing-design-tokens.md
    - CSS-Audit: css-audit.md
    - Block-System: block_editor_architecture.md
    - Landing-Styles: landing-style-overrides.md
    - SEO: seo-sef-overview.md
  - Administration:
    - Übersicht: admin.md
    - Namespace-Management: namespace-management.md
    - Migrationen: migrationen.md
  - Betrieb:
    - Deployment & Infrastruktur: deployment.md
  - Entwicklung:
    - Verbesserungen & Roadmap: improvements.md
  - Rechtliches:
    - Datenschutz: datenschutz.md
    - Impressum: impressum.md
    - Lizenz: lizenz.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bastelix/edocs-cloud

copyright: "&copy; bastelix – edocs.cloud Dokumentation"
