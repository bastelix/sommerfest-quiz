site_name: QuizRace Dokumentation
site_url: https://bastelix.github.io/sommerfest-quiz/
site_description: Quizsystem für Firmenfeiern – Dokumentation
repo_url: https://github.com/bastelix/sommerfest-quiz
repo_name: bastelix/sommerfest-quiz

docs_dir: docs

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Startseite: index.md
  - Handbuch:
    - Überblick: about.md
    - Spielablauf: spielablauf.md
    - FAQ: faq.md
  - Administration:
    - Übersicht: admin.md
    - Migrationen: migrationen.md
  - Technik:
    - API-Referenz: api-v1-reference.md
    - Architektur: architecture-review.md
    - ADR:
      - "001 – Namespace Text Slugs": adr/001-namespace-text-slugs.md
      - "002 – No DI Container": adr/002-no-di-container-legacy.md
      - "003 – No Frontend Build Tool": adr/003-no-frontend-build-tool.md
  - Entwicklung:
    - Design-Tokens: marketing-design-tokens.md
    - Namespace-Design: namespace-design.md
    - CSS-Audit: css-audit.md
    - Block-System: block_editor_architecture.md
    - Landing-Styles: landing-style-overrides.md
    - SEO: seo-sef-overview.md
  - Rechtliches:
    - Datenschutz: datenschutz.md
    - Impressum: impressum.md
    - Lizenz: lizenz.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bastelix/sommerfest-quiz

copyright: "&copy; bastelix – QuizRace Dokumentation"
